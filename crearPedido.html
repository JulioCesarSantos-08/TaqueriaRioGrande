<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuevo Pedido | Taquería Río Grande</title>

<link rel="icon" href="imagenes/logo1.png">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="crearPedido.css">

</head>

<body>

<header>

<a href="panel.html" class="volver">

<i class="fa-solid fa-arrow-left"></i>

</a>

<div>

<h1>Nuevo Pedido</h1>

<p>Taquería Río Grande</p>

</div>

</header>

<main>

<section class="pedido-info">

<div class="fila">

<div>

<label>Fecha</label>

<p id="fechaActual">13 Julio 2026</p>

</div>

<div>

<label>Hora</label>

<p id="horaActual">08:00 PM</p>

</div>

</div>

<div class="fila">

<div>

<label>Mesero</label>

<p id="nombreMesero">Cargando...</p>

</div>

<div>

<label>Pedido</label>

<p
class="folio"
id="folioPedido">

#-----

</p>

</div>

</div>

</section>

<section class="datos">

<h2>

Datos del Pedido

</h2>

<div class="campo">

<label>

Número de Mesa *

</label>

<input
type="number"
id="mesa"
placeholder="Ejemplo: 7">

</div>

<div class="campo">

<label>

Nombre del Cliente

<span>(Opcional)</span>

</label>

<input
type="text"
id="cliente"
placeholder="Nombre del cliente">

</div>

<div class="campo">

<label>

Celular

<span>(Opcional)</span>

</label>

<input
type="tel"
id="celular"
placeholder="951 xxx xx xx">

</div>

</section>

<section class="personas">

<h2>
👥 Personas de la Mesa
</h2>

<div id="listaPersonas">

</div>

<button
type="button"
id="agregarPersona"
class="boton-persona">

<i class="fa-solid fa-user-plus"></i>

Agregar Persona

</button>

</section>

</section>

<section class="extras">

<h2>

🍽 Productos para la Mesa

</h2>

<div id="productosMesa">

</div>

</section>

</main>

<footer>

<div class="total">

<div>

<p id="contadorProductos">

0 productos

</p>

<h2 id="totalPedido">

$0.00

</h2>

</div>

</div>

<div class="acciones">

<button id="limpiarPedido">

<i class="fa-solid fa-trash"></i>

Limpiar

</button>

<button id="crearPedido">

<i class="fa-solid fa-receipt"></i>

Crear Pedido

</button>

</div>

</footer>

<script type="module" src="firebase.js"></script>

<script type="module" src="crearPedido.js"></script>

</body>

</html>
